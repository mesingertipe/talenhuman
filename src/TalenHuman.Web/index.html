<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    .login-mobile-brand {
      display: flex !important;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%) !important;
      padding: 3rem 1.5rem !important; /* Total filling top space */
      margin: -3rem -3rem 1.5rem -3rem !important; 
      color: white !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      position: relative;
      z-index: 50;
    }

    .login-header {
      margin-top: 1rem !important;
      margin-bottom: 2rem !important;
      position: relative !important;
      z-index: 10 !important;
      text-align: left !important;
      padding-left: 0.25rem;
    }
  </style>
  <script>
    // 🚨 STABILITY RESET (V15.0.0 SAFE MODE)
    const CURRENT_VERSION = "V15.0.0";
    const lastVersion = localStorage.getItem('app_version');
    
    if (lastVersion !== CURRENT_VERSION) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
          }
        });
      }
      localStorage.clear();
      sessionStorage.clear();
      caches.keys().then(names => {
        for (let name of names) caches.delete(name);
      });
      // CRITICAL: SET VERSION TO STOP THE LOOP
      localStorage.setItem('app_version', CURRENT_VERSION);
      console.log("System Reset Performed - V15.0.0");
      window.location.reload();
    }
  </script>
  <title>TalenHuman</title>
</head>

<body>
  <div id="root"></div>
  <div id="modal-root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
