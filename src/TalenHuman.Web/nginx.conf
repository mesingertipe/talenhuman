server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api to the backend container
    location ^~ /api {
        proxy_pass http://talenhuman-api:8080/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy /swagger to the backend container
    location ^~ /swagger {
        proxy_pass http://talenhuman-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root location — React SPA
    location / {
        try_files $uri $uri/ /index.html;
        # Disable cache for index.html as it contains references to new hashes
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # PWA: Never cache any service worker or manifest variation
    location ~* (sw.*\.js|manifest.*\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        access_log off;
    }

    # Cache static assets (fingerprinted/hashed in /assets/)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache other standard static assets (icons, etc.)
    location ~* \.(png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }
}
