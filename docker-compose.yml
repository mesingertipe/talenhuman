services:
  talenhuman-api:
    build:
      context: .
      dockerfile: src/TalenHuman.API/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=${DB_HOST:-172.18.0.1};Port=${DB_PORT:-5432};Database=TalenHuman;Username=postgres;Password=${DB_PASSWORD:-postgres}
    ports:
      - "8080:8080"

  talenhuman-web:
    build:
      context: .
      dockerfile: src/TalenHuman.Web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - talenhuman-api
